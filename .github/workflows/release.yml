name: Package & Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from TOC
        id: version
        run: |
          VERSION=$(grep "^## Version:" ShareCraft.toc | sed 's/## Version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Build zip
        run: |
          cp ShareCraft.toc Data.lua GuildDB.lua Comm.lua Core.lua Scanner.lua Export.lua UI.lua /tmp/
          cd /tmp
          zip ShareCraft.zip ShareCraft.toc Data.lua GuildDB.lua Comm.lua Core.lua Scanner.lua Export.lua UI.lua
          cp ShareCraft.zip "$GITHUB_WORKSPACE/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ShareCraft v${{ steps.version.outputs.version }}
          body: |
            ## ShareCraft v${{ steps.version.outputs.version }}

            ### Installation
            1. Telecharger `ShareCraft.zip`
            2. Extraire dans `World of Warcraft/_anniversary_/Interface/AddOns/`
            3. Le dossier `ShareCraft` est cree automatiquement
            4. `/reload` en jeu
          files: ShareCraft.zip
          generate_release_notes: true
